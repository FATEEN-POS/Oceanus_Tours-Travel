<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oceanus — المصاريف</title>
<link rel="stylesheet" href="style.css">
<script src="shared.js"></script>
<style>
.cost-tabs{display:flex;gap:0;background:var(--sand);border-radius:var(--radius-sm);padding:4px;margin-bottom:1.5rem;width:fit-content}
.cost-tab{padding:.5rem 1.2rem;border:none;background:transparent;border-radius:6px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:.9rem;font-weight:600;color:var(--text-light);transition:all .2s}
.cost-tab.active{background:var(--ocean-mid);color:white;box-shadow:var(--shadow-sm)}
</style>
</head>
<body>
<header class="header">
  <div class="logo"><span class="logo-main">Oceanus</span><span class="logo-sub">Tours & Travel</span></div>
</header>
<nav class="main-nav">
  <a href="index.html"><span class="nav-icon">🏠</span> الرئيسية</a>
  <a href="cars.html"><span class="nav-icon">🚌</span> العربيات</a>
  <a href="location.html"><span class="nav-icon">📍</span> التشغيلات</a>
  <a href="cost.html" class="active"><span class="nav-icon">💸</span> المصاريف</a>
  <a href="report.html"><span class="nav-icon">📊</span> التقارير</a>
</nav>
<main class="container">
  <div class="flex-between mb-3 fade-in" style="flex-wrap:wrap;gap:1rem">
    <h1 class="page-title" style="margin-bottom:0">💸 المصاريف</h1>
    <button class="btn btn-coral btn-lg" onclick="openModal()">+ إضافة مصروف</button>
  </div>
  <div class="stats-grid fade-in" id="costStats"></div>
  <div class="cost-tabs fade-in">
    <button class="cost-tab active" onclick="setTab('all',this)">الكل</button>
    <button class="cost-tab" onclick="setTab('ثابت',this)">ثابتة</button>
    <button class="cost-tab" onclick="setTab('متغير',this)">متغيرة</button>
    <button class="cost-tab" onclick="setTab('أخري',this)">أخرى</button>
  </div>
  <div class="card fade-in">
    <div class="card-body" style="padding:0">
      <div class="table-wrap">
        <table>
          <thead><tr><th>#</th><th>التاريخ</th><th>النوع</th><th>البيان</th><th>العربية</th><th>المبلغ</th><th></th></tr></thead>
          <tbody id="costsBody"></tbody>
          <tfoot id="costsFoot"></tfoot>
        </table>
      </div>
    </div>
  </div>
</main>

<div class="modal-overlay" id="modalOverlay" onclick="closeIfBg(event)">
  <div class="modal">
    <div class="modal-header"><span id="modalTitle">إضافة مصروف</span><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label>التاريخ *</label><input type="date" class="form-control" id="fDate"></div>
        <div class="form-group"><label>نوع المصروف *</label><select class="form-control" id="fType" onchange="toggleCarField()"><option value="ثابت">ثابت</option><option value="متغير">متغير</option><option value="أخري">أخرى</option></select></div>
        <div class="form-group" style="grid-column:1/-1"><label>البيان / الوصف *</label><input class="form-control" id="fDesc" placeholder="مثال: إيجار مكتب / بنزين"></div>
        <div class="form-group"><label>المبلغ (ج.م) *</label><input type="number" class="form-control" id="fAmount" placeholder="0"></div>
        <div class="form-group" id="carFieldWrap"><label>العربية (اختياري)</label><select class="form-control" id="fCar"><option value="">غير محدد</option></select></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-coral" id="saveBtn" onclick="saveCost()">💾 حفظ</button>
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
let editId=null,currentTab='all';
let _cars=[],_costs=[];
function fmt(n){return Number(n||0).toLocaleString('ar-EG')+' ج.م'}
function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+type;setTimeout(()=>t.className='toast',2500)}
function setBtnLoading(id,loading){const b=document.getElementById(id);b.disabled=loading;b.textContent=loading?'⏳ جاري...':'💾 حفظ'}
const typeColor={'ثابت':'info','متغير':'warning','أخري':'danger'};

function renderStats(){
  const fixed=_costs.filter(c=>c.type==='ثابت').reduce((s,c)=>s+Number(c.amount||0),0);
  const variable=_costs.filter(c=>c.type==='متغير').reduce((s,c)=>s+Number(c.amount||0),0);
  const other=_costs.filter(c=>c.type==='أخري').reduce((s,c)=>s+Number(c.amount||0),0);
  document.getElementById('costStats').innerHTML=`
    <div class="stat-card warning"><div class="stat-icon">💸</div><div class="stat-info"><div class="stat-value" style="font-size:1.1rem">${fmt(fixed+variable+other)}</div><div class="stat-label">إجمالي المصاريف</div></div></div>
    <div class="stat-card"><div class="stat-icon">📌</div><div class="stat-info"><div class="stat-value" style="font-size:1.1rem">${fmt(fixed)}</div><div class="stat-label">ثابتة</div></div></div>
    <div class="stat-card coral"><div class="stat-icon">🔄</div><div class="stat-info"><div class="stat-value" style="font-size:1.1rem">${fmt(variable)}</div><div class="stat-label">متغيرة</div></div></div>
    <div class="stat-card success"><div class="stat-icon">📦</div><div class="stat-info"><div class="stat-value" style="font-size:1.1rem">${fmt(other)}</div><div class="stat-label">أخرى</div></div></div>`;
}

function setTab(tab,el){currentTab=tab;document.querySelectorAll('.cost-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderCosts()}

function renderCosts(){
  let costs=[..._costs].sort((a,b)=>b.date?.localeCompare(a.date||''));
  if(currentTab!=='all')costs=costs.filter(c=>c.type===currentTab);
  const total=costs.reduce((s,c)=>s+Number(c.amount||0),0);
  document.getElementById('costsBody').innerHTML=costs.length?costs.map((c,i)=>{
    const car=_cars.find(x=>x.id==c.carId);
    return `<tr class="fade-in"><td class="text-muted">${i+1}</td><td>${c.date}</td><td><span class="badge badge-${typeColor[c.type]||'info'}">${c.type}</span></td><td>${c.description}</td><td>${car?car.plate:'—'}</td><td class="text-danger fw-bold">${fmt(c.amount)}</td><td><div class="flex-gap"><button class="btn btn-ghost btn-sm" onclick="editCost(${c.id})">✏️</button><button class="btn btn-danger btn-sm" onclick="deleteCost(${c.id})">🗑️</button></div></td></tr>`;
  }).join(''):'<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">💸</div><p>لا توجد مصاريف</p></div></td></tr>';
  document.getElementById('costsFoot').innerHTML=`<tr><td colspan="5" class="fw-bold">الإجمالي</td><td class="text-danger fw-bold">${fmt(total)}</td><td></td></tr>`;
}

function openModal(id=null){
  editId=id;
  const cost=id?_costs.find(c=>c.id===id):null;
  document.getElementById('modalTitle').textContent=id?'تعديل المصروف':'إضافة مصروف جديد';
  document.getElementById('fDate').value=cost?.date||new Date().toISOString().split('T')[0];
  document.getElementById('fType').value=cost?.type||'ثابت';
  document.getElementById('fDesc').value=cost?.description||'';
  document.getElementById('fAmount').value=cost?.amount||'';
  document.getElementById('fCar').innerHTML='<option value="">غير محدد</option>'+_cars.map(c=>`<option value="${c.id}" ${cost?.carId==c.id?'selected':''}>${c.plate}</option>`).join('');
  toggleCarField();
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');editId=null}
function closeIfBg(e){if(e.target===e.currentTarget)closeModal()}
function toggleCarField(){document.getElementById('carFieldWrap').style.display=document.getElementById('fType').value==='متغير'?'':'none'}

async function saveCost(){
  const date=document.getElementById('fDate').value;
  const desc=document.getElementById('fDesc').value.trim();
  const amount=document.getElementById('fAmount').value;
  if(!date||!desc||!amount){showToast('❌ أدخل جميع الحقول','error');return}
  setBtnLoading('saveBtn',true);
  try{
    const data={date,type:document.getElementById('fType').value,description:desc,amount:Number(amount),carId:document.getElementById('fCar').value||null};
    if(editId){
      await DB.setCosts(_costs.map(c=>c.id===editId?{...c,...data}:c));
      showToast('✅ تم التعديل','success');
    }else{
      await DB.addCost(data);
      showToast('✅ تمت الإضافة','success');
    }
    closeModal();
    _costs=await DB.getCosts();
    renderStats();renderCosts();
  }catch(e){showToast('❌ '+e.message,'error')}
  finally{setBtnLoading('saveBtn',false)}
}
function editCost(id){openModal(id)}
async function deleteCost(id){
  if(!confirm('حذف هذا المصروف؟'))return;
  try{showLoader('جاري الحذف...');await DB.deleteCost(id);_costs=await DB.getCosts();renderStats();renderCosts();showToast('🗑️ تم الحذف')}
  catch(e){showToast('❌ '+e.message,'error')}finally{hideLoader()}
}

async function init(){
  try{
    showLoader('جاري التحميل...');
    [_cars,_costs]=await Promise.all([DB.getCars(),DB.getCosts()]);
    renderStats();renderCosts();toggleCarField();
  }catch(e){showToast('❌ تعذر الاتصال بـ Sheets','error');console.error(e)}
  finally{hideLoader()}
}
init();
</script>
</body>
</html>
