<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oceanus — العربيات</title>
<link rel="stylesheet" href="style.css">
<script src="shared.js"></script>
<style>
.cars-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.2rem;margin-top:1.5rem}
.car-card{background:white;border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);overflow:hidden;transition:all .25s}
.car-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-md)}
.car-top{background:var(--ocean-mid);padding:1.2rem 1.5rem;display:flex;align-items:center;justify-content:space-between}
.car-plate{font-size:1.3rem;font-weight:800;color:white;letter-spacing:1px}
.car-body{padding:1.2rem 1.5rem}
.car-row{display:flex;justify-content:space-between;margin-bottom:.5rem;font-size:.88rem}
.car-row span:first-child{color:var(--text-light)}.car-row span:last-child{font-weight:600;color:var(--text-dark)}
.car-actions{padding:0 1.5rem 1.2rem;display:flex;gap:.5rem}
</style>
</head>
<body>
<header class="header">
  <div class="logo"><span class="logo-main">Oceanus</span><span class="logo-sub">Tours & Travel</span></div>
</header>
<nav class="main-nav">
  <a href="index.html"><span class="nav-icon">🏠</span> الرئيسية</a>
  <a href="cars.html" class="active"><span class="nav-icon">🚌</span> العربيات</a>
  <a href="location.html"><span class="nav-icon">📍</span> التشغيلات</a>
  <a href="cost.html"><span class="nav-icon">💸</span> المصاريف</a>
  <a href="report.html"><span class="nav-icon">📊</span> التقارير</a>
</nav>
<main class="container">
  <div class="flex-between mb-3 fade-in">
    <h1 class="page-title" style="margin-bottom:0">🚌 العربيات</h1>
    <button class="btn btn-coral btn-lg" onclick="openModal()">+ إضافة عربية</button>
  </div>
  <div class="stats-grid fade-in" id="carStats"></div>
  <div class="cars-grid fade-in" id="carsGrid"><div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">⏳</div><p>جاري التحميل...</p></div></div>
</main>

<div class="modal-overlay" id="modalOverlay" onclick="closeIfBg(event)">
  <div class="modal">
    <div class="modal-header"><span id="modalTitle">إضافة عربية جديدة</span><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label>رقم اللوحة *</label><input class="form-control" id="fPlate" placeholder="مثال: أ ب ج 1234"></div>
        <div class="form-group"><label>نوع العربية *</label><select class="form-control" id="fType"><option>باص</option><option>ميكروباص</option><option>سيارة خاصة</option><option>فان</option></select></div>
        <div class="form-group"><label>السعة (ركاب)</label><input class="form-control" id="fCap" type="number" placeholder="50"></div>
        <div class="form-group"><label>اسم السائق</label><input class="form-control" id="fDriver" placeholder="اسم السائق"></div>
        <div class="form-group"><label>الحالة</label><select class="form-control" id="fStatus"><option>متاح</option><option>في رحلة</option><option>صيانة</option></select></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-coral" id="saveBtn" onclick="saveCar()">💾 حفظ</button>
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
let editId=null;
function fmt(n){return Number(n||0).toLocaleString('ar-EG')+' ج.م'}
function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+type;setTimeout(()=>t.className='toast',2500)}
function setLoading(btn,loading){btn.disabled=loading;btn.textContent=loading?'⏳ جاري الحفظ...':'💾 حفظ'}

async function renderStats(){
  const cars=await DB.getCars();
  const avail=cars.filter(c=>c.status==='متاح').length;
  const busy=cars.filter(c=>c.status==='في رحلة').length;
  const maint=cars.filter(c=>c.status==='صيانة').length;
  document.getElementById('carStats').innerHTML=`
    <div class="stat-card"><div class="stat-icon">🚌</div><div class="stat-info"><div class="stat-value">${cars.length}</div><div class="stat-label">إجمالي العربيات</div></div></div>
    <div class="stat-card success"><div class="stat-icon">✅</div><div class="stat-info"><div class="stat-value">${avail}</div><div class="stat-label">متاحة</div></div></div>
    <div class="stat-card coral"><div class="stat-icon">🛣️</div><div class="stat-info"><div class="stat-value">${busy}</div><div class="stat-label">في رحلة</div></div></div>
    <div class="stat-card warning"><div class="stat-icon">🔧</div><div class="stat-info"><div class="stat-value">${maint}</div><div class="stat-label">صيانة</div></div></div>`;
}

async function renderCars(){
  const [cars,ops]=await Promise.all([DB.getCars(),DB.getOperations()]);
  const grid=document.getElementById('carsGrid');
  if(!cars.length){grid.innerHTML='<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🚌</div><p>لا توجد عربيات مضافة</p></div>';return}
  grid.innerHTML=cars.map(car=>{
    const carOps=ops.filter(o=>o.carId==car.id);
    const totalRev=carOps.reduce((s,o)=>s+Number(o.revenue||0),0);
    const statusBadge=car.status==='متاح'?'success':car.status==='في رحلة'?'warning':'danger';
    return `<div class="car-card fade-in">
      <div class="car-top"><div class="car-plate">${car.plate}</div><span class="badge badge-${statusBadge}">${car.status}</span></div>
      <div class="car-body">
        <div class="car-row"><span>النوع</span><span>${car.type}</span></div>
        <div class="car-row"><span>السعة</span><span>${car.capacity||'—'} راكب</span></div>
        <div class="car-row"><span>السائق</span><span>${car.driver||'—'}</span></div>
        <div class="car-row"><span>عدد الرحلات</span><span>${carOps.length}</span></div>
        <div class="car-row"><span>إجمالي الإيرادات</span><span class="text-success">${fmt(totalRev)}</span></div>
      </div>
      <div class="car-actions">
        <button class="btn btn-ghost btn-sm" onclick="editCar(${car.id})">✏️ تعديل</button>
        <button class="btn btn-danger btn-sm" onclick="deleteCar(${car.id})">🗑️ حذف</button>
      </div>
    </div>`;
  }).join('');
}

function openModal(id=null){
  editId=id;
  const cars=JSON.parse(localStorage.getItem('oc_cars')||'[]');
  const car=id?cars.find(c=>c.id===id):null;
  document.getElementById('modalTitle').textContent=id?'تعديل العربية':'إضافة عربية جديدة';
  document.getElementById('fPlate').value=car?.plate||'';
  document.getElementById('fType').value=car?.type||'باص';
  document.getElementById('fCap').value=car?.capacity||'';
  document.getElementById('fDriver').value=car?.driver||'';
  document.getElementById('fStatus').value=car?.status||'متاح';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');editId=null}
function closeIfBg(e){if(e.target===e.currentTarget)closeModal()}
function editCar(id){openModal(id)}

async function saveCar(){
  const plate=document.getElementById('fPlate').value.trim();
  if(!plate){showToast('❌ أدخل رقم اللوحة','error');return}
  const btn=document.getElementById('saveBtn');
  setLoading(btn,true);
  try{
    const data={plate,type:document.getElementById('fType').value,capacity:document.getElementById('fCap').value,driver:document.getElementById('fDriver').value,status:document.getElementById('fStatus').value};
    if(editId){
      const all=await DB.getCars();
      await DB.setCars(all.map(c=>c.id===editId?{...c,...data}:c));
      showToast('✅ تم التعديل','success');
    }else{
      await DB.addCar(data);
      showToast('✅ تمت الإضافة','success');
    }
    closeModal();
    await Promise.all([renderStats(),renderCars()]);
  }catch(e){showToast('❌ خطأ: '+e.message,'error')}
  finally{setLoading(btn,false)}
}

async function deleteCar(id){
  if(!confirm('هل تريد حذف هذه العربية؟'))return;
  try{
    showLoader('جاري الحذف...');
    await DB.deleteCar(id);
    showToast('🗑️ تم الحذف');
    await Promise.all([renderStats(),renderCars()]);
  }catch(e){showToast('❌ '+e.message,'error')}
  finally{hideLoader()}
}

async function init(){
  try{await Promise.all([renderStats(),renderCars()])}
  catch(e){showToast('❌ تعذر الاتصال بـ Sheets','error');console.error(e)}
}
init();
</script>
</body>
</html>
