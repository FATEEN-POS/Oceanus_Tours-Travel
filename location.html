<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<script>
// ===== Oceanus Data Layer =====
// All data stored in localStorage — no database needed

const DB = {
  get: (key) => {
    try { return JSON.parse(localStorage.getItem('oceanus_' + key)) || []; }
    catch { return []; }
  },
  set: (key, val) => localStorage.setItem('oceanus_' + key, JSON.stringify(val)),

  getCars: () => DB.get('cars'),
  setCars: (d) => DB.set('cars', d),
  addCar: (car) => { const a = DB.getCars(); car.id = Date.now(); a.push(car); DB.setCars(a); return car; },
  deleteCar: (id) => DB.setCars(DB.getCars().filter(c => c.id !== id)),

  getLocations: () => DB.get('locations'),
  setLocations: (d) => DB.set('locations', d),
  addLocation: (loc) => { const a = DB.getLocations(); loc.id = Date.now(); a.push(loc); DB.setLocations(a); return loc; },
  deleteLocation: (id) => DB.setLocations(DB.getLocations().filter(l => l.id !== id)),

  getCosts: () => DB.get('costs'),
  setCosts: (d) => DB.set('costs', d),
  addCost: (cost) => { const a = DB.getCosts(); cost.id = Date.now(); cost.date = cost.date || new Date().toISOString().split('T')[0]; a.push(cost); DB.setCosts(a); return cost; },
  deleteCost: (id) => DB.setCosts(DB.getCosts().filter(c => c.id !== id)),

  getOperations: () => DB.get('operations'),
  setOperations: (d) => DB.set('operations', d),
  addOperation: (op) => { const a = DB.getOperations(); op.id = Date.now(); op.date = op.date || new Date().toISOString().split('T')[0]; a.push(op); DB.setOperations(a); return op; },
  deleteOperation: (id) => DB.setOperations(DB.getOperations().filter(o => o.id !== id)),

  exportToJSON: () => {
    const data = {
      cars: DB.getCars(),
      locations: DB.getLocations(),
      costs: DB.getCosts(),
      operations: DB.getOperations(),
      exportedAt: new Date().toISOString()
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'oceanus_backup_' + new Date().toISOString().split('T')[0] + '.json';
    a.click();
  },

  importFromJSON: (file) => {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if (data.cars) DB.setCars(data.cars);
          if (data.locations) DB.setLocations(data.locations);
          if (data.costs) DB.setCosts(data.costs);
          if (data.operations) DB.setOperations(data.operations);
          resolve();
        } catch { reject(new Error('ملف غير صالح')); }
      };
      reader.readAsText(file);
    });
  },

  seedDemo: () => {
    if (DB.getCars().length > 0) return;
    const cars = [
      { id: 1, plate: 'أ ب ج 1234', type: 'باص', capacity: 50, driver: 'محمد أحمد', status: 'متاح' },
      { id: 2, plate: 'د هـ و 5678', type: 'ميكروباص', capacity: 14, driver: 'خالد محمود', status: 'في رحلة' },
      { id: 3, plate: 'ز ح ط 9012', type: 'باص', capacity: 45, driver: 'عمر حسن', status: 'صيانة' },
      { id: 4, plate: 'ي ك ل 3456', type: 'سيارة خاصة', capacity: 7, driver: 'سامي علي', status: 'متاح' },
    ];
    const locations = [
      { id: 1, name: 'أبو سمبل', type: 'داخلي', distance: 890, duration: '2 يوم' },
      { id: 2, name: 'السد العالي', type: 'داخلي', distance: 880, duration: '1 يوم' },
      { id: 3, name: 'فيله', type: 'داخلي', distance: 885, duration: '1 يوم' },
      { id: 4, name: 'المسله', type: 'داخلي', distance: 870, duration: '1 يوم' },
    ];
    const operations = [
      { id: 1, date: '2025-03-01', carId: 1, locationId: 1, supplier: 'أبو سمبل', revenue: 5000, notes: 'رحلة ناجحة' },
      { id: 2, date: '2025-03-03', carId: 2, locationId: 2, supplier: 'السد', revenue: 3500, notes: '' },
      { id: 3, date: '2025-03-05', carId: 1, locationId: 3, supplier: 'فيله', revenue: 4200, notes: 'مجموعة كبيرة' },
      { id: 4, date: '2025-03-10', carId: 4, locationId: 4, supplier: 'المسله', revenue: 2800, notes: '' },
    ];
    const costs = [
      { id: 1, date: '2025-03-01', type: 'ثابت', description: 'إيجار مكتب', amount: 3000, carId: null },
      { id: 2, date: '2025-03-01', type: 'متغير', description: 'بنزين رحلة أبو سمبل', amount: 800, carId: 1 },
      { id: 3, date: '2025-03-03', type: 'متغير', description: 'بنزين رحلة السد', amount: 450, carId: 2 },
      { id: 4, date: '2025-03-05', type: 'أخري', description: 'مطبوعات وإعلانات', amount: 600, carId: null },
      { id: 5, date: '2025-03-05', type: 'متغير', description: 'بنزين رحلة فيله', amount: 700, carId: 1 },
      { id: 6, date: '2025-03-10', type: 'متغير', description: 'بنزين رحلة المسله', amount: 350, carId: 4 },
    ];
    DB.setCars(cars);
    DB.setLocations(locations);
    DB.setOperations(operations);
    DB.setCosts(costs);
  }
};

// Seed demo data on first load
DB.seedDemo();

</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oceanus — التشغيلات</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="logo">
    <span class="logo-main">Oceanus</span>
    <span class="logo-sub">Tours & Travel</span>
  </div>
</header>

<nav class="main-nav">
  <a href="index.html"><span class="nav-icon">🏠</span> الرئيسية</a>
  <a href="cars.html"><span class="nav-icon">🚌</span> العربيات</a>
  <a href="location.html" class="active"><span class="nav-icon">📍</span> التشغيلات</a>
  <a href="cost.html"><span class="nav-icon">💸</span> المصاريف</a>
  <a href="report.html"><span class="nav-icon">📊</span> التقارير</a>
</nav>

<main class="container">

  <div class="flex-between mb-3 fade-in" style="flex-wrap:wrap;gap:1rem">
    <h1 class="page-title" style="margin-bottom:0">📍 التشغيلات والرحلات</h1>
    <div class="flex-gap">
      <button class="btn btn-ghost btn-sm" onclick="openLocModal()">⚙️ إدارة الوجهات</button>
      <button class="btn btn-coral btn-lg" onclick="openOpModal()">+ إضافة تشغيلة</button>
    </div>
  </div>

  <div class="stats-grid fade-in" id="opStats"></div>

  <!-- Filter bar -->
  <div class="card mb-3 fade-in">
    <div class="card-body" style="padding:1rem">
      <div class="form-grid" style="gap:0.75rem">
        <div>
          <label style="font-size:0.8rem;font-weight:600;color:var(--text-light);display:block;margin-bottom:4px">فلتر بالتاريخ من</label>
          <input type="date" class="form-control" id="filterFrom" oninput="renderOps()">
        </div>
        <div>
          <label style="font-size:0.8rem;font-weight:600;color:var(--text-light);display:block;margin-bottom:4px">إلى</label>
          <input type="date" class="form-control" id="filterTo" oninput="renderOps()">
        </div>
        <div>
          <label style="font-size:0.8rem;font-weight:600;color:var(--text-light);display:block;margin-bottom:4px">العربية</label>
          <select class="form-control" id="filterCar" oninput="renderOps()">
            <option value="">كل العربيات</option>
          </select>
        </div>
        <div style="display:flex;align-items:flex-end">
          <button class="btn btn-ghost" onclick="clearFilters()">✕ مسح الفلاتر</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card fade-in">
    <div class="card-body" style="padding:0">
      <div class="table-wrap">
        <table id="opsTable">
          <thead>
            <tr>
              <th>#</th>
              <th>التاريخ</th>
              <th>العربية</th>
              <th>الوجهة / المورد</th>
              <th>الإيراد</th>
              <th>ملاحظات</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="opsBody"></tbody>
          <tfoot id="opsFoot"></tfoot>
        </table>
      </div>
    </div>
  </div>

</main>

<!-- Add Operation Modal -->
<div class="modal-overlay" id="opModalOverlay" onclick="closeIfBg(event,'opModalOverlay')">
  <div class="modal">
    <div class="modal-header">
      <span id="opModalTitle">إضافة تشغيلة جديدة</span>
      <button class="close-btn" onclick="closeOpModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group">
          <label>التاريخ *</label>
          <input type="date" class="form-control" id="opDate">
        </div>
        <div class="form-group">
          <label>العربية *</label>
          <select class="form-control" id="opCar"></select>
        </div>
        <div class="form-group">
          <label>الوجهة / المورد *</label>
          <select class="form-control" id="opLoc"></select>
        </div>
        <div class="form-group">
          <label>الإيراد (ج.م) *</label>
          <input type="number" class="form-control" id="opRevenue" placeholder="0">
        </div>
      </div>
      <div class="form-group mt-2">
        <label>ملاحظات</label>
        <input class="form-control" id="opNotes" placeholder="أي ملاحظات إضافية">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-coral" onclick="saveOp()">💾 حفظ</button>
      <button class="btn btn-ghost" onclick="closeOpModal()">إلغاء</button>
    </div>
  </div>
</div>

<!-- Manage Locations Modal -->
<div class="modal-overlay" id="locModalOverlay" onclick="closeIfBg(event,'locModalOverlay')">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <span>⚙️ إدارة الوجهات</span>
      <button class="close-btn" onclick="document.getElementById('locModalOverlay').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid mb-2">
        <div class="form-group" style="grid-column:1/-1">
          <label>اسم الوجهة الجديدة *</label>
          <input class="form-control" id="newLocName" placeholder="مثال: الأقصر">
        </div>
        <div class="form-group">
          <label>النوع</label>
          <select class="form-control" id="newLocType">
            <option>داخلي</option>
            <option>خارجي</option>
          </select>
        </div>
        <div class="form-group">
          <label>المسافة (كم)</label>
          <input type="number" class="form-control" id="newLocDist" placeholder="500">
        </div>
      </div>
      <button class="btn btn-coral mb-2" onclick="addLocation()">+ إضافة وجهة</button>
      <div id="locList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>


<script>
let opEditId = null;

function fmt(n) { return Number(n||0).toLocaleString('ar-EG') + ' ج.م'; }
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 2500);
}

function renderStats() {
  const ops = DB.getOperations();
  const totalRev = ops.reduce((s,o)=>s+Number(o.revenue||0),0);
  const thisMonth = new Date().toISOString().slice(0,7);
  const monthRev = ops.filter(o=>o.date?.startsWith(thisMonth)).reduce((s,o)=>s+Number(o.revenue||0),0);
  document.getElementById('opStats').innerHTML = `
    <div class="stat-card"><div class="stat-icon">🚀</div><div class="stat-info"><div class="stat-value">${ops.length}</div><div class="stat-label">إجمالي التشغيلات</div></div></div>
    <div class="stat-card coral"><div class="stat-icon">💰</div><div class="stat-info"><div class="stat-value" style="font-size:1.1rem">${fmt(totalRev)}</div><div class="stat-label">إجمالي الإيرادات</div></div></div>
    <div class="stat-card success"><div class="stat-icon">📅</div><div class="stat-info"><div class="stat-value" style="font-size:1.1rem">${fmt(monthRev)}</div><div class="stat-label">إيرادات الشهر الحالي</div></div></div>
    <div class="stat-card"><div class="stat-icon">📍</div><div class="stat-info"><div class="stat-value">${DB.getLocations().length}</div><div class="stat-label">عدد الوجهات</div></div></div>
  `;
}

function renderOps() {
  const cars = DB.getCars();
  const locs = DB.getLocations();
  const from = document.getElementById('filterFrom').value;
  const to   = document.getElementById('filterTo').value;
  const carF = document.getElementById('filterCar').value;

  let ops = [...DB.getOperations()].sort((a,b)=>b.date?.localeCompare(a.date||''));
  if (from) ops = ops.filter(o => o.date >= from);
  if (to)   ops = ops.filter(o => o.date <= to);
  if (carF) ops = ops.filter(o => String(o.carId) === carF);

  const total = ops.reduce((s,o)=>s+Number(o.revenue||0),0);

  document.getElementById('opsBody').innerHTML = ops.length ? ops.map((o,i) => {
    const car = cars.find(c=>c.id==o.carId);
    const loc = locs.find(l=>l.id==o.locationId);
    return `<tr class="fade-in">
      <td class="text-muted">${i+1}</td>
      <td>${o.date}</td>
      <td>${car ? car.plate : (o.carId||'—')}</td>
      <td>${o.supplier || loc?.name || '—'}</td>
      <td class="text-success fw-bold">${fmt(o.revenue)}</td>
      <td class="text-muted" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.notes||'—'}</td>
      <td>
        <div class="flex-gap">
          <button class="btn btn-ghost btn-sm" onclick="editOp(${o.id})">✏️</button>
          <button class="btn btn-danger btn-sm" onclick="deleteOp(${o.id})">🗑️</button>
        </div>
      </td>
    </tr>`;
  }).join('') : '<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">🚀</div><p>لا توجد تشغيلات</p></div></td></tr>';

  document.getElementById('opsFoot').innerHTML = `<tr><td colspan="4" class="fw-bold">الإجمالي</td><td class="text-success fw-bold">${fmt(total)}</td><td colspan="2"></td></tr>`;
}

function populateFilterCar() {
  const sel = document.getElementById('filterCar');
  const cars = DB.getCars();
  sel.innerHTML = '<option value="">كل العربيات</option>' + cars.map(c=>`<option value="${c.id}">${c.plate}</option>`).join('');
}

function clearFilters() {
  document.getElementById('filterFrom').value = '';
  document.getElementById('filterTo').value = '';
  document.getElementById('filterCar').value = '';
  renderOps();
}

function openOpModal(id=null) {
  opEditId = id;
  const op = id ? DB.getOperations().find(o=>o.id===id) : null;
  document.getElementById('opModalTitle').textContent = id ? 'تعديل التشغيلة' : 'إضافة تشغيلة جديدة';
  document.getElementById('opDate').value = op?.date || new Date().toISOString().split('T')[0];
  document.getElementById('opRevenue').value = op?.revenue || '';
  document.getElementById('opNotes').value = op?.notes || '';

  const cars = DB.getCars();
  const locs = DB.getLocations();
  document.getElementById('opCar').innerHTML = '<option value="">اختر العربية</option>' + cars.map(c=>`<option value="${c.id}" ${op?.carId==c.id?'selected':''}>${c.plate} — ${c.type}</option>`).join('');
  document.getElementById('opLoc').innerHTML = '<option value="">اختر الوجهة</option>' + locs.map(l=>`<option value="${l.id}" ${op?.locationId==l.id?'selected':''}>${l.name}</option>`).join('') + '<option value="custom">وجهة أخرى...</option>';

  if (op?.supplier) document.getElementById('opLoc').value = '';

  document.getElementById('opModalOverlay').classList.add('open');
}
function closeOpModal() { document.getElementById('opModalOverlay').classList.remove('open'); opEditId = null; }

function saveOp() {
  const date = document.getElementById('opDate').value;
  const carId = document.getElementById('opCar').value;
  const locationId = document.getElementById('opLoc').value;
  const revenue = document.getElementById('opRevenue').value;
  if (!date || !revenue) { showToast('❌ أدخل التاريخ والإيراد', 'error'); return; }

  const locs = DB.getLocations();
  const loc = locs.find(l=>l.id==locationId);
  const data = {
    date, carId: Number(carId), locationId: Number(locationId),
    supplier: loc?.name || '',
    revenue: Number(revenue),
    notes: document.getElementById('opNotes').value
  };
  if (opEditId) {
    DB.setOperations(DB.getOperations().map(o=>o.id===opEditId?{...o,...data}:o));
    showToast('✅ تم التعديل', 'success');
  } else {
    DB.addOperation(data);
    showToast('✅ تمت الإضافة', 'success');
  }
  closeOpModal();
  renderStats(); renderOps();
}

function editOp(id) { openOpModal(id); }
function deleteOp(id) {
  if (!confirm('حذف هذه التشغيلة؟')) return;
  DB.deleteOperation(id);
  showToast('🗑️ تم الحذف');
  renderStats(); renderOps();
}

// Locations management
function openLocModal() {
  renderLocList();
  document.getElementById('locModalOverlay').classList.add('open');
}
function renderLocList() {
  const locs = DB.getLocations();
  document.getElementById('locList').innerHTML = locs.length ? `
    <div class="table-wrap"><table><thead><tr><th>الوجهة</th><th>النوع</th><th>المسافة</th><th></th></tr></thead><tbody>
    ${locs.map(l=>`<tr>
      <td>${l.name}</td><td>${l.type||'—'}</td><td>${l.distance||'—'} كم</td>
      <td><button class="btn btn-danger btn-sm" onclick="deleteLoc(${l.id})">🗑️</button></td>
    </tr>`).join('')}
    </tbody></table></div>` : '<p class="text-muted" style="font-size:0.9rem">لا توجد وجهات مضافة</p>';
}
function addLocation() {
  const name = document.getElementById('newLocName').value.trim();
  if (!name) { showToast('❌ أدخل اسم الوجهة', 'error'); return; }
  DB.addLocation({
    name,
    type: document.getElementById('newLocType').value,
    distance: document.getElementById('newLocDist').value
  });
  document.getElementById('newLocName').value = '';
  document.getElementById('newLocDist').value = '';
  renderLocList();
  showToast('✅ تمت إضافة الوجهة', 'success');
}
function deleteLoc(id) {
  DB.deleteLocation(id);
  renderLocList();
}

function closeIfBg(e, id) { if(e.target===e.currentTarget) document.getElementById(id).classList.remove('open'); }

// Init
document.getElementById('opDate').value = new Date().toISOString().split('T')[0];
populateFilterCar();
renderStats();
renderOps();
</script>
</body>
</html>
