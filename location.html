<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oceanus — التشغيلات</title>
<link rel="stylesheet" href="style.css">
<script src="shared.js"></script>
</head>
<body>
<header class="header">
  <div class="logo"><span class="logo-main">Oceanus</span><span class="logo-sub">Tours & Travel</span></div>
</header>
<nav class="main-nav">
  <a href="index.html"><span class="nav-icon">🏠</span> الرئيسية</a>
  <a href="cars.html"><span class="nav-icon">🚌</span> العربيات</a>
  <a href="location.html" class="active"><span class="nav-icon">📍</span> التشغيلات</a>
  <a href="cost.html"><span class="nav-icon">💸</span> المصاريف</a>
  <a href="report.html"><span class="nav-icon">📊</span> التقارير</a>
</nav>
<main class="container">
  <div class="flex-between mb-3 fade-in" style="flex-wrap:wrap;gap:1rem">
    <h1 class="page-title" style="margin-bottom:0">📍 التشغيلات والرحلات</h1>
    <div class="flex-gap">
      <button class="btn btn-ghost btn-sm" onclick="openLocModal()">⚙️ إدارة الوجهات</button>
      <button class="btn btn-coral btn-lg" onclick="openOpModal()">+ إضافة تشغيلة</button>
    </div>
  </div>
  <div class="stats-grid fade-in" id="opStats"></div>
  <div class="card mb-3 fade-in">
    <div class="card-body" style="padding:1rem">
      <div class="form-grid" style="gap:.75rem">
        <div><label style="font-size:.8rem;font-weight:600;color:var(--text-light);display:block;margin-bottom:4px">من تاريخ</label><input type="date" class="form-control" id="filterFrom" oninput="renderOps()"></div>
        <div><label style="font-size:.8rem;font-weight:600;color:var(--text-light);display:block;margin-bottom:4px">إلى تاريخ</label><input type="date" class="form-control" id="filterTo" oninput="renderOps()"></div>
        <div><label style="font-size:.8rem;font-weight:600;color:var(--text-light);display:block;margin-bottom:4px">العربية</label><select class="form-control" id="filterCar" oninput="renderOps()"><option value="">كل العربيات</option></select></div>
        <div style="display:flex;align-items:flex-end"><button class="btn btn-ghost" onclick="clearFilters()">✕ مسح</button></div>
      </div>
    </div>
  </div>
  <div class="card fade-in">
    <div class="card-body" style="padding:0">
      <div class="table-wrap">
        <table>
          <thead><tr><th>#</th><th>التاريخ</th><th>العربية</th><th>الوجهة</th><th>الإيراد</th><th>ملاحظات</th><th></th></tr></thead>
          <tbody id="opsBody"></tbody>
          <tfoot id="opsFoot"></tfoot>
        </table>
      </div>
    </div>
  </div>
</main>

<!-- Add Op Modal -->
<div class="modal-overlay" id="opModalOverlay" onclick="closeIfBg(event,'opModalOverlay')">
  <div class="modal">
    <div class="modal-header"><span id="opModalTitle">إضافة تشغيلة</span><button class="close-btn" onclick="closeOpModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label>التاريخ *</label><input type="date" class="form-control" id="opDate"></div>
        <div class="form-group"><label>العربية *</label><select class="form-control" id="opCar"></select></div>
        <div class="form-group"><label>الوجهة *</label><select class="form-control" id="opLoc"></select></div>
        <div class="form-group"><label>الإيراد (ج.م) *</label><input type="number" class="form-control" id="opRevenue" placeholder="0"></div>
      </div>
      <div class="form-group mt-2"><label>ملاحظات</label><input class="form-control" id="opNotes" placeholder="أي ملاحظات"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-coral" id="opSaveBtn" onclick="saveOp()">💾 حفظ</button>
      <button class="btn btn-ghost" onclick="closeOpModal()">إلغاء</button>
    </div>
  </div>
</div>

<!-- Locations Modal -->
<div class="modal-overlay" id="locModalOverlay" onclick="closeIfBg(event,'locModalOverlay')">
  <div class="modal" style="max-width:480px">
    <div class="modal-header"><span>⚙️ إدارة الوجهات</span><button class="close-btn" onclick="document.getElementById('locModalOverlay').classList.remove('open')">✕</button></div>
    <div class="modal-body">
      <div class="form-grid mb-2">
        <div class="form-group" style="grid-column:1/-1"><label>اسم الوجهة *</label><input class="form-control" id="newLocName" placeholder="مثال: الأقصر"></div>
        <div class="form-group"><label>النوع</label><select class="form-control" id="newLocType"><option>داخلي</option><option>خارجي</option></select></div>
        <div class="form-group"><label>المسافة (كم)</label><input type="number" class="form-control" id="newLocDist" placeholder="500"></div>
      </div>
      <button class="btn btn-coral mb-2" id="addLocBtn" onclick="addLocation()">+ إضافة</button>
      <div id="locList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
let opEditId=null;
function fmt(n){return Number(n||0).toLocaleString('ar-EG')+' ج.م'}
function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+type;setTimeout(()=>t.className='toast',2500)}
function setBtnLoading(id,loading,text='💾 حفظ'){const b=document.getElementById(id);b.disabled=loading;b.textContent=loading?'⏳ جاري...':text}

// cached data
let _cars=[],_locs=[],_ops=[];

async function loadAll(){
  [_cars,_locs,_ops]=await Promise.all([DB.getCars(),DB.getLocations(),DB.getOperations()]);
}

async function renderStats(){
  const rev=_ops.reduce((s,o)=>s+Number(o.revenue||0),0);
  const thisMonth=new Date().toISOString().slice(0,7);
  const monthRev=_ops.filter(o=>o.date?.startsWith(thisMonth)).reduce((s,o)=>s+Number(o.revenue||0),0);
  document.getElementById('opStats').innerHTML=`
    <div class="stat-card"><div class="stat-icon">🚀</div><div class="stat-info"><div class="stat-value">${_ops.length}</div><div class="stat-label">إجمالي التشغيلات</div></div></div>
    <div class="stat-card coral"><div class="stat-icon">💰</div><div class="stat-info"><div class="stat-value" style="font-size:1.1rem">${fmt(rev)}</div><div class="stat-label">إجمالي الإيرادات</div></div></div>
    <div class="stat-card success"><div class="stat-icon">📅</div><div class="stat-info"><div class="stat-value" style="font-size:1.1rem">${fmt(monthRev)}</div><div class="stat-label">إيرادات هذا الشهر</div></div></div>
    <div class="stat-card"><div class="stat-icon">📍</div><div class="stat-info"><div class="stat-value">${_locs.length}</div><div class="stat-label">عدد الوجهات</div></div></div>`;
}

function populateFilterCar(){
  document.getElementById('filterCar').innerHTML='<option value="">كل العربيات</option>'+_cars.map(c=>`<option value="${c.id}">${c.plate}</option>`).join('');
}

function renderOps(){
  const from=document.getElementById('filterFrom').value;
  const to=document.getElementById('filterTo').value;
  const carF=document.getElementById('filterCar').value;
  let ops=[..._ops].sort((a,b)=>b.date?.localeCompare(a.date||''));
  if(from)ops=ops.filter(o=>o.date>=from);
  if(to)ops=ops.filter(o=>o.date<=to);
  if(carF)ops=ops.filter(o=>String(o.carId)===carF);
  const total=ops.reduce((s,o)=>s+Number(o.revenue||0),0);
  document.getElementById('opsBody').innerHTML=ops.length?ops.map((o,i)=>{
    const car=_cars.find(c=>c.id==o.carId);
    const loc=_locs.find(l=>l.id==o.locationId);
    return `<tr class="fade-in"><td class="text-muted">${i+1}</td><td>${o.date}</td><td>${car?car.plate:'—'}</td><td>${o.supplier||loc?.name||'—'}</td><td class="text-success fw-bold">${fmt(o.revenue)}</td><td class="text-muted" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.notes||'—'}</td><td><div class="flex-gap"><button class="btn btn-ghost btn-sm" onclick="editOp(${o.id})">✏️</button><button class="btn btn-danger btn-sm" onclick="deleteOp(${o.id})">🗑️</button></div></td></tr>`;
  }).join(''):'<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">🚀</div><p>لا توجد تشغيلات</p></div></td></tr>';
  document.getElementById('opsFoot').innerHTML=`<tr><td colspan="4" class="fw-bold">الإجمالي</td><td class="text-success fw-bold">${fmt(total)}</td><td colspan="2"></td></tr>`;
}

function clearFilters(){document.getElementById('filterFrom').value='';document.getElementById('filterTo').value='';document.getElementById('filterCar').value='';renderOps()}

function openOpModal(id=null){
  opEditId=id;
  const op=id?_ops.find(o=>o.id===id):null;
  document.getElementById('opModalTitle').textContent=id?'تعديل التشغيلة':'إضافة تشغيلة جديدة';
  document.getElementById('opDate').value=op?.date||new Date().toISOString().split('T')[0];
  document.getElementById('opRevenue').value=op?.revenue||'';
  document.getElementById('opNotes').value=op?.notes||'';
  document.getElementById('opCar').innerHTML='<option value="">اختر العربية</option>'+_cars.map(c=>`<option value="${c.id}" ${op?.carId==c.id?'selected':''}>${c.plate} — ${c.type}</option>`).join('');
  document.getElementById('opLoc').innerHTML='<option value="">اختر الوجهة</option>'+_locs.map(l=>`<option value="${l.id}" ${op?.locationId==l.id?'selected':''}>${l.name}</option>`).join('');
  document.getElementById('opModalOverlay').classList.add('open');
}
function closeOpModal(){document.getElementById('opModalOverlay').classList.remove('open');opEditId=null}

async function saveOp(){
  const date=document.getElementById('opDate').value;
  const revenue=document.getElementById('opRevenue').value;
  if(!date||!revenue){showToast('❌ أدخل التاريخ والإيراد','error');return}
  setBtnLoading('opSaveBtn',true);
  try{
    const locId=document.getElementById('opLoc').value;
    const loc=_locs.find(l=>l.id==locId);
    const data={date,carId:Number(document.getElementById('opCar').value)||null,locationId:Number(locId)||null,supplier:loc?.name||'',revenue:Number(revenue),notes:document.getElementById('opNotes').value};
    if(opEditId){
      await DB.setOperations(_ops.map(o=>o.id===opEditId?{...o,...data}:o));
      showToast('✅ تم التعديل','success');
    }else{
      await DB.addOperation(data);
      showToast('✅ تمت الإضافة','success');
    }
    closeOpModal();
    await loadAll();
    renderStats();renderOps();
  }catch(e){showToast('❌ '+e.message,'error')}
  finally{setBtnLoading('opSaveBtn',false)}
}

function editOp(id){openOpModal(id)}
async function deleteOp(id){
  if(!confirm('حذف هذه التشغيلة؟'))return;
  try{showLoader('جاري الحذف...');await DB.deleteOperation(id);await loadAll();renderStats();renderOps();showToast('🗑️ تم الحذف')}
  catch(e){showToast('❌ '+e.message,'error')}finally{hideLoader()}
}

async function openLocModal(){
  await renderLocList();
  document.getElementById('locModalOverlay').classList.add('open');
}
async function renderLocList(){
  document.getElementById('locList').innerHTML=_locs.length?`<div class="table-wrap"><table><thead><tr><th>الوجهة</th><th>النوع</th><th>المسافة</th><th></th></tr></thead><tbody>${_locs.map(l=>`<tr><td>${l.name}</td><td>${l.type||'—'}</td><td>${l.distance||'—'} كم</td><td><button class="btn btn-danger btn-sm" onclick="deleteLoc(${l.id})">🗑️</button></td></tr>`).join('')}</tbody></table></div>`:'<p class="text-muted" style="font-size:.9rem">لا توجد وجهات</p>';
}
async function addLocation(){
  const name=document.getElementById('newLocName').value.trim();
  if(!name){showToast('❌ أدخل اسم الوجهة','error');return}
  setBtnLoading('addLocBtn',true,'+إضافة');
  try{
    await DB.addLocation({name,type:document.getElementById('newLocType').value,distance:document.getElementById('newLocDist').value});
    document.getElementById('newLocName').value='';document.getElementById('newLocDist').value='';
    _locs=await DB.getLocations();
    await renderLocList();
    showToast('✅ تمت الإضافة','success');
  }catch(e){showToast('❌ '+e.message,'error')}
  finally{setBtnLoading('addLocBtn',false,'+ إضافة')}
}
async function deleteLoc(id){
  try{showLoader('جاري الحذف...');await DB.deleteLocation(id);_locs=await DB.getLocations();await renderLocList()}
  catch(e){showToast('❌ '+e.message,'error')}finally{hideLoader()}
}

function closeIfBg(e,id){if(e.target===e.currentTarget)document.getElementById(id).classList.remove('open')}

async function init(){
  try{
    showLoader('جاري التحميل...');
    await loadAll();
    populateFilterCar();
    renderStats();
    renderOps();
  }catch(e){showToast('❌ تعذر الاتصال بـ Sheets','error');console.error(e)}
  finally{hideLoader()}
}
init();
</script>
</body>
</html>
